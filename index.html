<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scout</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- API Key Warning -->
    <div id="api-warning" class="banner hidden">
      <span>API_KEY is missing. Add it to app.js to enable analysis.</span>
    </div>

    <!-- Home Screen -->
    <section id="home-screen" class="view">
      <header class="home-header">
        <h1>Scout</h1>
        <p>Company Intelligence Engine</p>
      </header>
      
      <div class="search-box">
        <div class="input-group">
          <input type="text" id="company-name" placeholder="Company name" autocomplete="off">
          <button id="toggle-context" class="btn-text">+ Add context</button>
        </div>
        <textarea id="extra-context" class="hidden" placeholder="URL, pitch notes, or extra context..."></textarea>
        <button id="analyse-btn" class="btn-primary">Analyse</button>
      </div>

      <div id="recent-searches" class="recent-container">
        <h3>Recent</h3>
        <div id="recent-chips" class="chips"></div>
      </div>
    </section>

    <!-- Report View -->
    <section id="report-screen" class="view hidden">
      <nav class="report-nav">
        <button id="back-to-home" class="btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div id="report-title-header" class="header-compact"></div>
      </nav>

      <div id="report-container">
        <!-- Rendered Dynamically -->
      </div>
    </section>

    <!-- Loading Skeleton -->
    <section id="loading-screen" class="view hidden">
      <div class="loading-header">
        <h2 id="loading-company-name">Researching...</h2>
        <div class="shimmer header-shimmer"></div>
      </div>
      <div class="skeleton-grid">
        <div class="skeleton-card tldr-skeleton shimmer"></div>
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
      </div>
    </section>

    <!-- Error View -->
    <section id="error-screen" class="view hidden">
      <div class="error-box">
        <h2>Analysis Failed</h2>
        <p id="error-message"></p>
        <button id="retry-btn" class="btn-primary">Retry</button>
      </div>
    </section>

    <!-- Outreach View -->
    <section id="outreach-screen" class="view hidden">
      <nav class="report-nav">
        <button id="back-to-report" class="btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="header-compact">Mission Outreach</div>
      </nav>

      <div class="search-box outreach-form">
        <div class="memo-label">Step 1: Input Intelligence</div>
        <textarea id="resume-text" placeholder="Paste resume here..." style="min-height: 200px;"></textarea>
        
        <div class="format-selector" style="display:flex; gap:1rem; margin-top:1rem;">
          <label style="flex:1; cursor:pointer;">
            <input type="radio" name="format" value="linkedin" checked style="display:none;">
            <div class="format-chip">LinkedIn DM</div>
          </label>
          <label style="flex:1; cursor:pointer;">
            <input type="radio" name="format" value="email" style="display:none;">
            <div class="format-chip">Email</div>
          </label>
        </div>

        <button id="generate-outreach-btn" class="btn-primary" style="margin-top:1.5rem;">Generate Mission Message</button>
      </div>

      <div id="outreach-result" class="hidden" style="margin-top:3rem; animation: viewIn 0.5s ease;">
        <!-- Rendered Dynamically -->
      </div>
    </section>

    <!-- Install Banner -->
    <div id="install-banner" class="banner hidden">
      <span>Install Scout for offline access</span>
      <button id="install-btn" class="btn-pill">Install</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
