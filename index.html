<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scout // Operator Intelligence</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css?v=16.18">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  
  <!-- PDF Generation Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div id="app">
    
    <!-- Home Interface -->
    <section id="home-screen" class="view">
      <header class="home-header">
        <h1>Scout</h1>
        <p>Company Intelligence Engine</p>
      </header>

      <div class="search-box">
        <div class="input-group">
          <input type="text" id="company-name" placeholder="Target Company" autocomplete="off">
        </div>
        
        <div style="display:flex; flex-direction:column; align-items:center; gap:1.5rem; width:100%;">
          <button id="toggle-context" class="btn-text" style="font-family:var(--mono); font-size:0.55rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.2em; border:none; background:none; cursor:pointer;">+ Add Context</button>
          <textarea id="extra-context" class="hidden" style="width:100%; text-align:center; border:1px solid var(--border); padding:1rem; border-radius:4px; background:transparent; color:var(--text); font-family:var(--sans);" placeholder="Add specific industry or research goals..."></textarea>
          <button id="analyse-btn" class="btn-primary">Analyse</button>
        </div>
      </div>

      <div class="recent-container">
        <h3>Recent Intelligence</h3>
        <div id="recent-chips" class="chips"></div>
      </div>
    </section>

    <!-- Disambiguation Interface -->
    <section id="disambiguation-screen" class="view hidden">
      <!-- Dynamic Content -->
    </section>

    <!-- Loading Interface -->
    <section id="loading-screen" class="view hidden" style="align-items: center; justify-content: center; text-align: center;">
      <div class="loading-header">
        <div style="font-family:var(--mono); font-size:0.6rem; color:var(--accent); margin-bottom:1rem; letter-spacing:0.2em;">AGENTIC HUNT IN PROGRESS</div>
        <h2 id="loading-company-name" style="font-family:var(--serif); font-size:4rem; margin-bottom:2rem;">Searching...</h2>
      </div>
      <div class="skeleton-grid" style="width:100%; max-width:500px; display:grid; gap:1rem;">
        <div class="shimmer" style="height:2px; background:var(--border-strong); width:100%;"></div>
        <div class="shimmer" style="height:2px; background:var(--border-strong); width:80%; justify-self:center;"></div>
        <div class="shimmer" style="height:2px; background:var(--border-strong); width:60%; justify-self:center;"></div>
      </div>
    </section>

    <!-- Report Interface -->
    <section id="report-screen" class="view hidden">
      <nav class="report-nav">
        <button id="back-to-home" class="btn-icon">← BACK</button>
        <div id="report-title-header" style="font-family:var(--mono); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.2em; color:var(--text-dim);">Report Summary</div>
        <button id="download-pdf-btn" class="btn-icon">PDF ↓</button>
      </nav>
      
      <div id="report-container">
        <!-- Dynamic Content -->
      </div>
    </section>

    <!-- Outreach Interface -->
    <section id="outreach-screen" class="view hidden">
      <nav class="report-nav">
        <button id="back-to-report" class="btn-icon">← BACK</button>
        <div style="font-family:var(--mono); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.2em; color:var(--text-dim);">Mission Message</div>
        <div style="width:40px;"></div>
      </nav>

      <div class="memo-header">
        <h1>Draft Outreach</h1>
        <p style="color:var(--text-dim); margin-top:1rem;">Constructing a high-conviction pattern-interrupt message.</p>
      </div>

      <div class="memo-section">
        <div class="memo-label">USER INPUT</div>
        <textarea id="resume-text" style="width:100%; min-height:200px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:1.5rem; border-radius:8px; font-family:var(--sans); font-size:0.9rem;" placeholder="Paste your resume or bio here..."></textarea>
        <button id="generate-outreach-btn" class="btn-primary" style="width:100%; margin-top:1.5rem;">Generate Mission Message</button>
      </div>

      <div id="outreach-result" class="hidden">
        <!-- Dynamic Result -->
      </div>
    </section>

    <!-- Error Screen -->
    <section id="error-screen" class="view hidden" style="align-items: center; justify-content: center; text-align: center;">
      <h2 style="font-family:var(--serif); font-size:3rem; color:var(--danger); margin-bottom:1rem;">Mission Aborted</h2>
      <p id="error-message" style="color:var(--text-dim); margin-bottom:2rem;"></p>
      <button id="retry-btn" class="btn-primary">Retry Search</button>
    </section>

  </div>

  <!-- PDF Template (Hidden) -->
  <div id="pdf-export-template"></div>

  <script src="app.js?v=16.18"></script>
</body>
</html>
